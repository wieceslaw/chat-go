services:
  db: # psql -h localhost -p 5432 -U myuser -d mydatabase
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh"]
    command: 
      [
        "-c",
        "migrate -path=/migrations -database postgres://myuser:mypassword@db:5432/mydatabase?sslmode=disable up"
      ]
    restart: "no"
    networks:
      - backend

  app:
    image: chatapp:latest
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_DATABASE: mydatabase
      DATABASE_USERNAME: myuser
      DATABASE_PASSWORD: mypassword
    ports:
      - "8080:8080"
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
